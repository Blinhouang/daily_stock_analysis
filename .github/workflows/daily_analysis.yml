name: 每日股票分析 

on: 
  # 定时触发 (GitHub Actions 使用 UTC 时间，北京时间 = UTC + 8)
  schedule: 
    - cron: '36 1 * * 1-5'     # 01:36 UTC = 北京 09:36 (个股)
    - cron: '43 5 * * 1-5'     # 05:43 UTC = 北京 13:43 (个股)
    - cron: '27 12 * * 1-5'    # 12:27 UTC = 北京 20:27 (大盘)
    
  # 手动触发 
  workflow_dispatch: 
    inputs: 
      mode: 
        description: '运行模式' 
        required: true 
        default: 'full' 
        type: choice 
        options: 
          - full           # 完整分析（股票+大盘） 
          - market-only    # 仅大盘复盘 
          - stocks-only    # 仅股票分析 
      force_run: 
        description: '强制运行（跳过交易日检查）' 
        required: false 
        default: false 
        type: boolean 

# 并发控制：同一时间只运行一个分析任务 
concurrency: 
  group: stock-analysis 
  cancel-in-progress: false 

jobs: 
  analyze: 
    runs-on: ubuntu-latest 
    # 添加超时限制，防止任务卡死 
    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '30') }} 
    
    steps: 
      - name: 随机延迟（避免固定时间访问） 
        run: sleep $((RANDOM % 60))  # 随机延迟0-60秒启动 
        
      - name: 检出代码 
        uses: actions/checkout@v5 
        
      - name: 设置 Python 环境 
        uses: actions/setup-python@v6 
        with: 
          python-version: '3.11' 
          cache: 'pip' 
        
      - name: 安装依赖 
        run: | 
          pip install --upgrade pip 
          pip install -r requirements.txt 
        
      - name: 创建必要目录 
        run: | 
          mkdir -p data logs reports 
        
      - name: 执行股票分析 
        env: 
          # [此处省略你原有的 AI、数据源、通知渠道等环境变量，请保持不变]
          # 请确保 EMAIL_SENDER, EMAIL_PASSWORD, EMAIL_RECEIVERS 等变量依然在此处
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          EMAIL_SENDER: ${{ vars.EMAIL_SENDER || secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS || secrets.EMAIL_RECEIVERS }}
          # ... (请保留原文件中 env 下的所有其他变量)

        run: | 
          # 处理 LITELLM YAML 配置文件 
          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then 
            echo "📝 使用 GitHub Actions Secrets/Variables 中的 LITELLM_CONFIG_YAML 配置" 
            mkdir -p "$(dirname "$LITELLM_CONFIG")" 
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG" 
            echo "✅ LITELLM 配置文件已写入: $LITELLM_CONFIG" 
          fi 

          # ==========================================
          # 核心修改点：根据触发时间和方式判断运行模式
          # ==========================================
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 获取当前北京时间的小时和分钟 (例如 0936)
            CST_TIME=$(TZ='Asia/Shanghai' date +%H%M)
            CST_HOUR=$(TZ='Asia/Shanghai' date +%H)
            
            echo "当前北京时间: $CST_TIME"

            # 判定逻辑：
            # 09点 或 13点/14点 -> 只跑个股 (考虑到 GitHub 可能延迟 10-20 分钟运行)
            if [[ "$CST_HOUR" == "09" || "$CST_HOUR" == "10" || "$CST_HOUR" == "13" || "$CST_HOUR" == "14" ]]; then
              MODE="stocks-only"
            # 20点/21点 -> 只跑大盘
            elif [[ "$CST_HOUR" == "20" || "$CST_HOUR" == "21" ]]; then
              MODE="market-only"
            else
              MODE="full"
            fi
          else
            # 如果是手动触发，依然读取面板上的选择
            MODE="${{ github.event.inputs.mode || 'full' }}"
          fi
          
          echo "==========================================" 
          echo "🚀 A股自选股智能分析系统" 
          echo "==========================================" 
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" 
          echo "🎯 运行模式: $MODE" 
          echo "==========================================" 
          
          # 构建命令行参数 
          FORCE_RUN_ARG="" 
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then 
            FORCE_RUN_ARG="--force-run" 
            echo "⚡ 已启用强制运行模式" 
          fi 

          # 执行分析（直接根据 MODE 调用对应的 python 命令）
          if [ "$MODE" = "market-only" ]; then 
            python main.py --market-review $FORCE_RUN_ARG 
          elif [ "$MODE" = "stocks-only" ]; then 
            python main.py --no-market-review $FORCE_RUN_ARG 
          else 
            python main.py $FORCE_RUN_ARG 
          fi 
        
      - name: 上传分析报告 
        uses: actions/upload-artifact@v6 
        if: always() 
        with: 
          name: analysis-reports-${{ github.run_number }} 
          path: | 
            reports/ 
            logs/ 
          retention-days: 30
